<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LetraViva{% endblock %}</title>
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface: rgba(255, 255, 255, 0.85);
            --surface-border: rgba(0, 0, 0, 0.06);
            --accent: #0d9488;
            --accent-light: #ccfbf1;
            --accent-gradient: linear-gradient(135deg, #0d9488 0%, #2dd4bf 100%);
            --nav-bg: rgba(15, 23, 42, 0.92);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #f0fdfa 0%, #e0f2fe 50%, #f5f3ff 100%);
            min-height: 100vh;
            color: #334155;
        }

        .site-navbar {
            background: var(--nav-bg) !important;
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.6rem 0;
        }

        .site-navbar .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .site-navbar .navbar-brand i {
            color: #2dd4bf;
            margin-right: 0.4rem;
        }

        .card-surface {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--surface-border);
            border-radius: 1rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .nav-link {
            color: rgba(255,255,255,0.75) !important;
            font-weight: 500;
            font-size: 0.92rem;
            transition: color 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            color: #2dd4bf !important;
        }

        .btn-accent {
            background: var(--accent-gradient);
            border: none;
            color: #fff;
            padding: 0.55rem 1.4rem;
            border-radius: 0.6rem;
            font-weight: 500;
            font-size: 0.9rem;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-accent:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.3);
            color: #fff;
        }

        .btn-outline-accent {
            border: 1.5px solid var(--accent);
            color: var(--accent);
            padding: 0.55rem 1.4rem;
            border-radius: 0.6rem;
            font-weight: 500;
            font-size: 0.9rem;
            background: transparent;
            transition: all 0.2s;
        }

        .btn-outline-accent:hover {
            background: var(--accent);
            color: #fff;
        }

        .page-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--accent-light);
        }

        .page-header h1 {
            font-weight: 700;
            font-size: 1.6rem;
            color: #0f172a;
        }

        .footer-bar {
            text-align: center;
            padding: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.82rem;
            margin-top: 2rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark site-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'gestion:inicio' %}">
                <i class="bi bi-journal-richtext"></i>LetraViva
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'gestion:inicio' %}">
                            <i class="bi bi-house-door me-1"></i>Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'gestion:lista_autores' %}">
                            <i class="bi bi-people me-1"></i>Autores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'gestion:lista_libros' %}">
                            <i class="bi bi-collection me-1"></i>Libros
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="card-surface p-4 p-md-5">
            {% block content %}
            {% endblock %}
        </div>

        <div class="footer-bar">
            Taller 2 &mdash; Django &middot; Gestión de Libros &middot; UCC 2026
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
